name: Deploy to VPS

# Auto-deploy the static site to the VPS whenever main is updated.
# Uses SSH + rsync for minimal, idempotent deployment.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST             e.g. 203.0.113.42  or  anvithbizcap.in
#   VPS_USER             e.g. deploy
#   VPS_SSH_KEY          the full PEM private key (contents, not path)
#   VPS_PORT             e.g. 22            (optional, defaults to 22)
#   VPS_PATH             e.g. /var/www/anvithbizcap

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from the Actions tab

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # never cancel an in-flight deploy

jobs:
  deploy:
    name: rsync → VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${{ secrets.VPS_PORT }}"
          PORT="${PORT:-22}"
          ssh-keyscan -p "$PORT" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          PORT="${VPS_PORT:-22}"
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='deploy' \
            --exclude='.gitignore' \
            --exclude='DEPLOY.md' \
            --exclude='README.md' \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=yes" \
            ./ "$VPS_USER@$VPS_HOST:$VPS_PATH/"

      - name: Post-deploy — reload nginx (non-fatal)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          PORT="${VPS_PORT:-22}"
          # reload nginx if the user has sudoers NOPASSWD entry for it (see setup-vps.sh)
          ssh -i ~/.ssh/deploy_key -p "$PORT" "$VPS_USER@$VPS_HOST" \
            "sudo -n nginx -t && sudo -n systemctl reload nginx" || echo "nginx reload skipped (no sudo NOPASSWD — site files still deployed)"

      - name: Summary
        run: |
          echo "### Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: \`${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Triggered by: \`${{ github.actor }}\`" >> "$GITHUB_STEP_SUMMARY"
