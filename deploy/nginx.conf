# /etc/nginx/sites-available/anvithbizcap
#
# Nginx server block for AnvithBizCap static site.
# 1. Replace anvithbizcap.in with your actual domain.
# 2. Replace /var/www/anvithbizcap with your actual web root if different.
# 3. Symlink to sites-enabled and reload:
#      sudo ln -s /etc/nginx/sites-available/anvithbizcap /etc/nginx/sites-enabled/
#      sudo nginx -t && sudo systemctl reload nginx
# 4. Issue HTTPS with certbot:
#      sudo certbot --nginx -d anvithbizcap.in -d www.anvithbizcap.in
#    (certbot rewrites this file to add 443 listener + redirect)

# ---------- HTTP (port 80) — redirect to HTTPS ----------
server {
    listen 80;
    listen [::]:80;
    server_name anvithbizcap.in www.anvithbizcap.in;

    # Let certbot acquire/renew certs via HTTP-01 challenge without redirect loops
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS (port 443) — main site ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name anvithbizcap.in www.anvithbizcap.in;

    root /var/www/anvithbizcap;
    index index.html;

    # SSL — certbot will populate these. Placeholders below.
    # ssl_certificate     /etc/letsencrypt/live/anvithbizcap.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/anvithbizcap.in/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ------- Security headers (SEBI CSCRF 2025-aligned) -------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # CSP — tuned for this static site: Google Fonts + inline SVG only, no external JS
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # ------- Compression -------
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml+rss text/xml font/ttf font/otf;

    # ------- Caching -------
    # Static assets — long-cache. Bust via versioned filenames when you add a build step.
    location ~* \.(css|js|svg|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # HTML — short-cache so the user always gets the latest copy within minutes
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri =404;
    }

    # Pretty URLs — /mutual-funds serves /mutual-funds.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Block access to dotfiles, deploy scripts, and source control
    location ~ /\.(?!well-known) { deny all; access_log off; log_not_found off; }
    location ~ /(README|DEPLOY)\.md$ { deny all; }
    location /deploy/  { deny all; }
    location /\.github/ { deny all; }

    # Custom 404 — falls back to index if you want SPA-like routing
    error_page 404 /index.html;

    # Logs
    access_log /var/log/nginx/anvithbizcap.access.log;
    error_log  /var/log/nginx/anvithbizcap.error.log warn;

    # Large upload protection — this is a static site, 1 MB cap is plenty
    client_max_body_size 1m;
}
