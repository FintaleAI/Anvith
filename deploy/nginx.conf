# /etc/nginx/sites-available/anvithbizcap
#
# Production nginx server block for AnvithBizCap static site.
# This is the AUTHORITATIVE version — mirrors what is running on the
# Hostinger VPS (31.97.231.61) as of April 2026.
#
# Install:
#   1. Ensure nginx + certbot are installed
#   2. Copy this file to /etc/nginx/sites-available/anvithbizcap
#   3. Create the security snippet (see bottom of this file)
#   4. Symlink: ln -s /etc/nginx/sites-available/anvithbizcap /etc/nginx/sites-enabled/
#   5. Issue HTTPS: certbot --nginx -d anvithbizcap.com -d www.anvithbizcap.com
#   6. Reload: nginx -t && systemctl reload nginx
#
# IMPORTANT — nginx add_header inheritance gotcha:
#   When a `location` block declares ANY `add_header`, ALL inherited
#   server-level headers are dropped for that location. We work around
#   this by storing the security headers in a reusable snippet and
#   including it in every location that declares its own headers.

# ---------- HTTP (port 80) — redirect to HTTPS ----------
server {
    listen 80;
    listen [::]:80;
    server_name anvithbizcap.com www.anvithbizcap.com;

    # Keep certbot's HTTP-01 challenge path unredirected
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS (port 443) — main site ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name anvithbizcap.com www.anvithbizcap.com;

    root /var/www/anvithbizcap;
    index index.html;

    # Certbot-managed certificate
    ssl_certificate     /etc/letsencrypt/live/anvithbizcap.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anvithbizcap.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ------- Security headers (server scope — inherited by locations
    #         that don't declare their own add_header) -------
    include /etc/nginx/snippets/anvithbizcap-security.conf;

    # ------- Compression -------
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml+rss text/xml font/ttf font/otf;

    # ------- Long-cache static assets (30 days, immutable) -------
    location ~* \.(css|js|svg|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|webp|avif)$ {
        include /etc/nginx/snippets/anvithbizcap-security.conf;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # ------- Short-cache HTML (5 minutes) -------
    location ~* \.html$ {
        include /etc/nginx/snippets/anvithbizcap-security.conf;
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri =404;
    }

    # ------- Pretty URLs — /mutual-funds serves /mutual-funds.html -------
    location / {
        include /etc/nginx/snippets/anvithbizcap-security.conf;
        try_files $uri $uri.html $uri/ =404;
    }

    # ------- Access blocks -------
    location ~ /\.(?!well-known) { deny all; access_log off; log_not_found off; }
    location ~ /(README|DEPLOY)\.md$ { deny all; }
    location /deploy/  { deny all; }
    location /\.github/ { deny all; }

    error_page 404 /index.html;

    access_log /var/log/nginx/anvithbizcap.access.log;
    error_log  /var/log/nginx/anvithbizcap.error.log warn;

    client_max_body_size 1m;
}

# -----------------------------------------------------------------
# COMPANION SNIPPET — save as /etc/nginx/snippets/anvithbizcap-security.conf
# -----------------------------------------------------------------
